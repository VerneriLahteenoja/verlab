# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - verlab

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: verrn.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_5DA10D20D77C453E8E1B4416892A00DC }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_8E3BE5A8373B4E4F92EEE2473DA4BEF4 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: verrn.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_5DA10D20D77C453E8E1B4416892A00DC }}/verbuild:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'verlab'
          slot-name: 'Production'
          images: 'verrn.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_5DA10D20D77C453E8E1B4416892A00DC }}/verbuild:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E14F05A295E4421CB613F75F23335D02 }}